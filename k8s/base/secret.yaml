apiVersion: v1
kind: Secret
metadata:
  name: pixelclock-secret
type: Opaque
stringData:
  # NEVER commit real values here. This file is a template.
  #
  # Options for managing this secret:
  #   1. Seal it with Sealed Secrets (kubeseal) and commit the SealedSecret instead.
  #   2. Use External Secrets Operator pointed at Vault / AWS SSM / etc.
  #   3. Manually apply with: kubectl create secret generic pixelclock-secret \
  #        --from-literal=mqtt-broker-url=tcp://192.168.1.50:1883
  #
  # For a homelab with no auth broker, this can just be the plain broker address.
  mqtt-broker-url: "tcp://REPLACE_ME:1883"
