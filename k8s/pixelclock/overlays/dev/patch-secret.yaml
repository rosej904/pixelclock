apiVersion: v1
kind: Secret
metadata:
  name: pixelclock-secret
type: Opaque
stringData:
  # Dev broker — can be a separate Mosquitto instance in the cluster,
  # or the same broker (messages won't reach the real device because
  # awtrix-prefix is set to "awtrix-dev" above).
  mqtt-broker-url: "tcp://mosquitto-service.pixelclock-dev.svc.cluster.local:1883"
