apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: pixelclock-prod

# Prod uses a pinned SHA or explicit version tag — never a mutable tag like :latest.
# Update this tag as part of your promotion process.
images:
  - name: zot.lan:5000/pixelclock
    newTag: "1.0.0"

patches:
  - path: patch-config.yaml
  - path: patch-secret.yaml
