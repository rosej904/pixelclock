apiVersion: v1
kind: Secret
metadata:
  name: pixelclock-secret
type: Opaque
stringData:
  # Points to the real Mosquitto broker that the TC001 is subscribed to.
  # Replace with your actual broker address or manage via Sealed Secrets.
  mqtt-broker-url: "tcp://mosquitto-service.pixelclock-prod.svc.cluster.local:1883"
