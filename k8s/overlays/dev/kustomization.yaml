apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pull in everything from base, then apply our overrides below.
resources:
  - ../../base

# Adds a -dev suffix to every resource name (deployment, configmap, secret)
# so dev and prod can coexist in the same namespace without colliding.
nameSuffix: -dev

# All resources in this overlay get this namespace.
namespace: pixelclock-dev

# Pin to the :dev image tag. You'll push this tag during development.
images:
  - name: yourdockerhubuser/pixelclock
    newTag: dev

# Overlay-specific patches — overrides just the fields that differ from base.
patches:
  - path: patch-config.yaml
  - path: patch-secret.yaml
