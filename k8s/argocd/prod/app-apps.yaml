apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pixelclock-apps-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:rosej904/pixelclock.git
    targetRevision: HEAD
    path: k8s/argocd/prod/  # Points to the folder containing the children below
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true