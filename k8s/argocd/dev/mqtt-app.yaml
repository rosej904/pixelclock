apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mqtt-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # Sync before PixelClock app
spec:
  project: default
  source:
    repoURL: git@github.com:rosej904/pixelclock.git
    targetRevision: HEAD
    path: k8s/mqtt/overlays/dev # ArgoCD automatically detects Kustomize here
  destination:
    server: https://kubernetes.default.svc
    namespace: pixelclock-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true