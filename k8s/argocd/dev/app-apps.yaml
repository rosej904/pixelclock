apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pixelclock-apps-dev
  namespace: argocd
  
spec:
  project: default
  source:
    repoURL: git@github.com:rosej904/pixelclock.git
    targetRevision: HEAD
    path: k8s/argocd/dev/  # Points to the folder containing the children below
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Automatically create namespaces if they don't exist
      - Recursive=true # Recursively sync child applications