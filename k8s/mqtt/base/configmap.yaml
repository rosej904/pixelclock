apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
data:
  mosquitto.conf: |
    # Mosquitto configuration file.
    # For more options, see https://mosquitto
    listener 1883
    allow_anonymous true

    # WebSocket listener (useful for browser-based tools later)
    listener 9001
    protocol websockets
    allow_anonymous true

    # Persistence
    persistence true
    persistence_location /mosquitto/data/

    # Logging
    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information
