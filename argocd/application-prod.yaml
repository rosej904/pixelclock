apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ulanzi-clock-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/youruser/ulanzi-clock.git
    # Prod tracks a release branch or tag rather than HEAD.
    # This means prod only updates when you deliberately cut a release,
    # not on every commit to main.
    targetRevision: release
    path: k8s/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: pixelclock-prod

  syncPolicy:
    # Prod sync is manual — you review in the ArgoCD UI and click Sync.
    # Remove this block (or set automated:) if you want auto-sync on prod too.
    syncOptions:
      - CreateNamespace=true
