# Mosquitto MQTT Broker Configuration
# For local development - no auth, allows anonymous connections
# Lock this down in production!

listener 1883
allow_anonymous true

# WebSocket listener (useful for browser-based tools later)
listener 9001
protocol websockets
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
